<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" fill="#0a0a0f"/>
  <!-- Grid lines -->
  <line x1="10" y1="100" x2="118" y2="100" stroke="#00d4ff22" stroke-width="0.5"/>
  <line x1="10" y1="80" x2="118" y2="80" stroke="#00d4ff22" stroke-width="0.5"/>
  <line x1="10" y1="60" x2="118" y2="60" stroke="#00d4ff22" stroke-width="0.5"/>
  <!-- Auth building -->
  <rect x="15" y="55" width="18" height="45" fill="#00d4ff" opacity="0.85" rx="1"/>
  <rect x="15" y="52" width="12" height="5" fill="#00d4ff"/>
  <circle cx="28" cy="54" r="2" fill="#30d158"/>
  <!-- Gateway -->
  <rect x="50" y="70" width="28" height="30" fill="#bf5af2" opacity="0.85" rx="1"/>
  <rect x="50" y="67" width="20" height="5" fill="#bf5af2"/>
  <circle cx="63" cy="69" r="2" fill="#30d158"/>
  <!-- User building -->
  <rect x="95" y="60" width="18" height="40" fill="#30d158" opacity="0.85" rx="1"/>
  <rect x="95" y="57" width="12" height="5" fill="#30d158"/>
  <circle cx="108" cy="59" r="2" fill="#30d158"/>
  <!-- Postgres -->
  <rect x="50" y="85" width="28" height="15" fill="#64d2ff" opacity="0.85" rx="1"/>
  <rect x="50" y="82" width="18" height="5" fill="#64d2ff"/>
  <!-- Connection lines -->
  <line x1="33" y1="77" x2="50" y2="85" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="78" y1="85" x2="95" y2="80" stroke="#30d158" stroke-width="1" opacity="0.6"/>
  <line x1="64" y1="100" x2="64" y2="85" stroke="#bf5af2" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>
  <!-- Text -->
  <text x="24" y="50" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">AUTH</text>
  <text x="64" y="66" font-family="monospace" font-size="8" fill="#bf5af2" text-anchor="middle">GATEWAY</text>
  <text x="104" y="55" font-family="monospace" font-size="8" fill="#30d158" text-anchor="middle">USER</text>
  <!-- Camera indicator -->
  <circle cx="110" cy="20" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="110" y1="12" x2="110" y2="28" stroke="#00d4ff" stroke-width="1"/>
  <line x1="102" y1="20" x2="118" y2="20" stroke="#00d4ff" stroke-width="1"/>
</svg>